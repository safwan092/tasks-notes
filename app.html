// ─── Helpers ────────────────────────────────────────────────────────────────
function newId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6) }
function now(){ return new Date().toISOString() }
function fmtDate(iso){
  if(!iso) return ''
  try{ return new Date(iso).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) }
  catch{ return iso }
}

// ─── Google API ──────────────────────────────────────────────────────────────
let _token = null
const setToken = t => _token = t
const getToken = () => _token

async function sheetsGet(id,range){
  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}`,
    {headers:{Authorization:`Bearer ${_token}`}})
  if(!r.ok) throw new Error(`Sheets error ${r.status}`)
  return r.json()
}
async function sheetsAppend(id,range,values){
  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,
    {method:'POST',headers:{Authorization:`Bearer ${_token}`,'Content-Type':'application/json'},body:JSON.stringify({values})})
  if(!r.ok) throw new Error(`Sheets append error ${r.status}`)
  return r.json()
}
async function sheetsUpdate(id,range,values){
  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,
    {method:'PUT',headers:{Authorization:`Bearer ${_token}`,'Content-Type':'application/json'},body:JSON.stringify({values})})
  if(!r.ok) throw new Error(`Sheets update error ${r.status}`)
  return r.json()
}
async function ensureSheet(id,name){
  const meta = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}?fields=sheets.properties.title`,
    {headers:{Authorization:`Bearer ${_token}`}}).then(r=>r.json())
  if(meta.sheets?.some(s=>s.properties.title===name)) return
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}:batchUpdate`,
    {method:'POST',headers:{Authorization:`Bearer ${_token}`,'Content-Type':'application/json'},
     body:JSON.stringify({requests:[{addSheet:{properties:{title:name}}}]})})
}
async function initSheets(id){
  await ensureSheet(id,'Tasks')
  await ensureSheet(id,'Notes')
  const t = await sheetsGet(id,'Tasks!A1:I1')
  if(!t.values?.length) await sheetsAppend(id,'Tasks!A1',[['id','text','status','createdAt','modifiedAt','doneAt','attachments','subTasks','folder']])
  const n = await sheetsGet(id,'Notes!A1:H1')
  if(!n.values?.length) await sheetsAppend(id,'Notes!A1',[['id','title','project','body','status','createdAt','modifiedAt','attachments']])
}

// Tasks CRUD  (column I = folder)
function rowToTask(r){ if(!r||!r[0])return null; return {id:r[0],text:r[1]||'',status:r[2]||'active',createdAt:r[3]||'',modifiedAt:r[4]||'',doneAt:r[5]||'',attachments:r[6]?JSON.parse(r[6]):[],subTasks:r[7]?JSON.parse(r[7]):[],folder:r[8]||'Personal'} }
function taskToRow(t){ return [t.id,t.text,t.status,t.createdAt,t.modifiedAt,t.doneAt||'',JSON.stringify(t.attachments||[]),JSON.stringify(t.subTasks||[]),t.folder||'Personal'] }
async function getTasks(id){ const r=await sheetsGet(id,'Tasks!A:I'); return (r.values||[]).slice(1).map(rowToTask).filter(Boolean) }
async function addTask(id,text,folder='Personal'){ const t={id:newId(),text,status:'active',createdAt:now(),modifiedAt:now(),doneAt:'',attachments:[],subTasks:[],folder}; await sheetsAppend(id,'Tasks!A:I',[taskToRow(t)]); return t }
async function findTaskRow(id,tid){ const r=await sheetsGet(id,'Tasks!A:I'); const rows=r.values||[]; for(let i=1;i<rows.length;i++) if(rows[i][0]===tid) return i+1; return null }
async function updateTask(id,task){ task.modifiedAt=now(); const row=await findTaskRow(id,task.id); if(!row) throw new Error('Not found'); await sheetsUpdate(id,`Tasks!A${row}:I${row}`,[taskToRow(task)]); return task }
async function deleteTask(id,tid){ const row=await findTaskRow(id,tid); if(!row) return; const r=await sheetsGet(id,`Tasks!A${row}:I${row}`); const t=rowToTask((r.values||[[]])[0]); if(t){t.status='deleted';t.modifiedAt=now();await sheetsUpdate(id,`Tasks!A${row}:I${row}`,[taskToRow(t)])} }

// Notes CRUD
function rowToNote(r){ if(!r||!r[0])return null; return {id:r[0],title:r[1]||'',project:r[2]||'',body:r[3]||'',status:r[4]||'active',createdAt:r[5]||'',modifiedAt:r[6]||'',attachments:r[7]?JSON.parse(r[7]):[]} }
function noteToRow(n){ return [n.id,n.title,n.project||'',n.body,n.status,n.createdAt,n.modifiedAt,JSON.stringify(n.attachments||[])] }
async function getNotes(id){ const r=await sheetsGet(id,'Notes!A:H'); return (r.values||[]).slice(1).map(rowToNote).filter(Boolean) }
async function addNote(id,{title,project,body}){ const n={id:newId(),title,project:project||'',body,status:'active',createdAt:now(),modifiedAt:now(),attachments:[]}; await sheetsAppend(id,'Notes!A:H',[noteToRow(n)]); return n }
async function findNoteRow(id,nid){ const r=await sheetsGet(id,'Notes!A:H'); const rows=r.values||[]; for(let i=1;i<rows.length;i++) if(rows[i][0]===nid) return i+1; return null }
async function updateNote(id,note){ note.modifiedAt=now(); const row=await findNoteRow(id,note.id); if(!row) throw new Error('Not found'); await sheetsUpdate(id,`Notes!A${row}:H${row}`,[noteToRow(note)]); return note }
async function deleteNote(id,nid){ const row=await findNoteRow(id,nid); if(!row) return; const r=await sheetsGet(id,`Notes!A${row}:H${row}`); const n=rowToNote((r.values||[[]])[0]); if(n){n.status='deleted';n.modifiedAt=now();await sheetsUpdate(id,`Notes!A${row}:H${row}`,[noteToRow(n)])} }

// Drive
async function getOrCreateFolder(name,parentId=null){
  const q=parentId?`name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`:`name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`
  const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`,{headers:{Authorization:`Bearer ${_token}`}}).then(r=>r.json())
  if(r.files?.length) return r.files[0].id
  const body={name,mimeType:'application/vnd.google-apps.folder'}
  if(parentId) body.parents=[parentId]
  const c=await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{Authorization:`Bearer ${_token}`,'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json())
  return c.id
}
async function uploadFile(file,folderId){
  const meta={name:file.name,parents:[folderId]}
  const form=new FormData()
  form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}))
  form.append('file',file)
  const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink,thumbnailLink',{method:'POST',headers:{Authorization:`Bearer ${_token}`},body:form})
  if(!r.ok) throw new Error('Upload failed')
  const d=await r.json()
  await fetch(`https://www.googleapis.com/drive/v3/files/${d.id}/permissions`,{method:'POST',headers:{Authorization:`Bearer ${_token}`,'Content-Type':'application/json'},body:JSON.stringify({role:'reader',type:'anyone'})})
  return d
}
async function addToCalendar({summary,description,dateTime}){
  const start=new Date(dateTime), end=new Date(start.getTime()+3600000)
  const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{method:'POST',headers:{Authorization:`Bearer ${_token}`,'Content-Type':'application/json'},body:JSON.stringify({summary,description,start:{dateTime:start.toISOString()},end:{dateTime:end.toISOString()}})})
  if(!r.ok) throw new Error('Calendar error')
  return r.json()
}

// ─── Context ─────────────────────────────────────────────────────────────────
const Ctx = createContext(null)
function useApp(){ return useContext(Ctx) }

const DEFAULT_SETTINGS = { spreadsheetId:'', driveFolderName:'TasksNotesApp', clientId:'' }

function AppProvider({children}){
  const [settings,setSettingsState]=useState(()=>{ try{return JSON.parse(localStorage.getItem('appSettings')||'null')||DEFAULT_SETTINGS}catch{return DEFAULT_SETTINGS} })
  const [user,setUser]=useState(null)
  const [tasks,setTasks]=useState([])
  const [notes,setNotes]=useState([])
  const [loading,setLoading]=useState(false)
  const [syncing,setSyncing]=useState(false)
  const [error,setError]=useState(null)

  function saveSettings(s){ localStorage.setItem('appSettings',JSON.stringify(s)); setSettingsState(s) }

  async function loadData(sid){
    if(!sid) return
    setLoading(true); setError(null)
    try{
      await initSheets(sid)
      const [t,n]=await Promise.all([getTasks(sid),getNotes(sid)])
      setTasks(t.filter(x=>x.status!=='deleted'))
      setNotes(n.filter(x=>x.status!=='deleted'))
    }catch(e){ setError(e.message) }
    finally{ setLoading(false) }
  }

  async function handleSignIn(tokenResp,userInfo){
    setToken(tokenResp.access_token); setUser(userInfo)
    if(settings.spreadsheetId) await loadData(settings.spreadsheetId)
  }
  function handleSignOut(){ setToken(null); setUser(null); setTasks([]); setNotes([]) }

  async function refreshData(){
    if(!settings.spreadsheetId) return
    setSyncing(true)
    try{
      const [t,n]=await Promise.all([getTasks(settings.spreadsheetId),getNotes(settings.spreadsheetId)])
      setTasks(t.filter(x=>x.status!=='deleted'))
      setNotes(n.filter(x=>x.status!=='deleted'))
    }catch(e){ setError(e.message) }
    finally{ setSyncing(false) }
  }

  return <Ctx.Provider value={{settings,saveSettings,user,tasks,setTasks,notes,setNotes,loading,syncing,error,handleSignIn,handleSignOut,refreshData,loadData}}>{children}</Ctx.Provider>
}

function ActionBtn({ico,label,color='gray',onClick,disabled}){
  const colors={gray:'text-gray-500 bg-gray-50 hover:bg-gray-100',blue:'text-blue-500 bg-blue-50 hover:bg-blue-100',red:'text-red-500 bg-red-50 hover:bg-red-100',green:'text-green-600 bg-green-50 hover:bg-green-100'}
  return <button onClick={onClick} disabled={disabled} className={`flex items-center gap-1 text-xs rounded-lg px-2.5 py-1.5 font-medium active:opacity-70 ${colors[color]} disabled:opacity-40`}>
    <Ico k={ico} size={13}/>{label}
  </button>
}

// ─── Login Screen ─────────────────────────────────────────────────────────────
function LoginScreen(){
  const {settings,saveSettings,handleSignIn}=useApp()
  const [err,setErr]=useState('')
  const needsSetup=!settings.clientId||!settings.spreadsheetId
  const [mode,setMode]=useState(needsSetup?'setup':'signin')
  const [form,setForm]=useState({clientId:settings.clientId||'',spreadsheetId:settings.spreadsheetId||'',driveFolderName:settings.driveFolderName||'TasksNotesApp'})

  function saveForm(){
    if(!form.clientId.trim()||!form.spreadsheetId.trim()) return
    saveSettings({...settings,...form})
    setMode('signin')
  }

  function signIn(){
    setErr('')
    const cid=settings.clientId||form.clientId
    if(!cid||!settings.spreadsheetId){setMode('setup');return}
    const client=window.google?.accounts?.oauth2?.initTokenClient({
      client_id:cid,
      scope:'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
      callback:async resp=>{
        if(resp.error){setErr('Sign-in failed: '+resp.error);return}
        const ui=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:`Bearer ${resp.access_token}`}}).then(r=>r.json())
        handleSignIn(resp,ui)
      }
    })
    if(!client){setErr('Google sign-in not loaded yet — wait a moment and try again.');return}
    client.requestAccessToken()
  }

  return <div className="flex flex-col h-full bg-gradient-to-br from-blue-50 to-indigo-100 overflow-y-auto scrollable">
    <div className="flex flex-col items-center justify-center min-h-full px-6 py-10">
      <div className="w-full max-w-sm">
        <div className="flex flex-col items-center mb-8">
          <div className="w-20 h-20 bg-indigo-500 rounded-3xl flex items-center justify-center shadow-lg mb-4">
            <Ico k="task" size={40} className="text-white"/>
          </div>
          <h1 className="text-3xl font-bold text-gray-800">Tasks & Notes</h1>
          <p className="text-gray-500 mt-1 text-sm">Powered by Google Sheets & Drive</p>
        </div>

        {mode==='setup'
          ?<div className="bg-white rounded-2xl shadow-lg p-5 space-y-4">
            <h2 className="text-lg font-bold text-gray-800">Connect your Google account</h2>
            <div className="bg-indigo-50 rounded-xl p-3 text-xs text-indigo-800 space-y-1.5">
              <p className="font-semibold">One-time setup:</p>
              <p>1. <a href="https://console.cloud.google.com" target="_blank" rel="noopener noreferrer" className="underline">console.cloud.google.com</a> → Enable APIs: Sheets, Drive, Calendar</p>
              <p>2. Credentials → OAuth 2.0 Client ID (Web app) → add <strong className="break-all">{window.location.origin}</strong> as Authorized JavaScript origin → copy Client ID</p>
              <p>3. Open a blank <a href="https://sheets.google.com" target="_blank" rel="noopener noreferrer" className="underline">Google Sheet</a> and copy the ID from its URL</p>
            </div>
            {err&&<div className="bg-red-50 border border-red-200 rounded-xl p-3 text-sm text-red-700">{err}</div>}
            <div className="space-y-1">
              <label className="text-xs font-semibold text-gray-600 uppercase tracking-wide">OAuth Client ID</label>
              <input value={form.clientId} onChange={e=>setForm({...form,clientId:e.target.value.trim()})}
                placeholder="xxxx.apps.googleusercontent.com"

// ─── Task Item ────────────────────────────────────────────────────────────────
function TaskItem({task,onUpdate,onDelete,isDragging,isDragOver,onDragHandlePointerDown,folders,onMoveTask}){
  const {settings}=useApp()
  const [menuOpen,setMenuOpen]=useState(false)
  const [editingText,setEditingText]=useState(false)
  const [editText,setEditText]=useState(task.text)
  const [newSub,setNewSub]=useState('')
  const [addingSub,setAddingSub]=useState(false)
  const [uploading,setUploading]=useState(false)
  const [calOpen,setCalOpen]=useState(false)
  const [moveOpen,setMoveOpen]=useState(false)
  const [busy,setBusy]=useState(false)

  async function run(fn){ setBusy(true); try{ await fn() }catch(e){ alert(e.message) }finally{ setBusy(false) } }

  async function toggleDone(){
    const done=task.status!=='done'
    const updated={...task,status:done?'done':'active',doneAt:done?now():''}
    await run(async()=>{ await updateTask(settings.spreadsheetId,updated); onUpdate(updated) })
  }
  async function saveEdit(){
    if(!editText.trim()) return
    const updated={...task,text:editText.trim()}
    await run(async()=>{ await updateTask(settings.spreadsheetId,updated); onUpdate(updated); setEditingText(false) })
  }
  async function archive(){
    const updated={...task,status:task.status==='archived'?'active':'archived'}
    await run(async()=>{ await updateTask(settings.spreadsheetId,updated); onUpdate(updated) })
  }
  async function handleDelete(){
    setMenuOpen(false)
    if(!confirm('Delete this task?')) return
    await run(async()=>{ await deleteTask(settings.spreadsheetId,task.id); onDelete(task.id) })
  }
  async function addSub(){
    if(!newSub.trim()) return
    const sub={id:newId(),text:newSub.trim(),done:false,createdAt:now(),doneAt:''}
    const updated={...task,subTasks:[...(task.subTasks||[]),sub]}
    await run(async()=>{ await updateTask(settings.spreadsheetId,updated); onUpdate(updated); setNewSub(''); setAddingSub(false) })
  }
  async function toggleSub(sid){
    const subs=(task.subTasks||[]).map(s=>s.id===sid?{...s,done:!s.done,doneAt:!s.done?now():''}:s)
    const allDone=subs.length>0&&subs.every(s=>s.done)
    const updated={...task,subTasks:subs,status:allDone?'done':task.status==='done'?'active':task.status,doneAt:allDone?now():task.doneAt}
    await run(async()=>{ await updateTask(settings.spreadsheetId,updated); onUpdate(updated) })
  }
  async function deleteSub(sid){
    const updated={...task,subTasks:(task.subTasks||[]).filter(s=>s.id!==sid)}
    await run(async()=>{ await updateTask(settings.spreadsheetId,updated); onUpdate(updated) })
  }
  async function handleAttach(file){
    if(!file) return
    setUploading(true)
    try{
      const fid=await getOrCreateFolder(settings.driveFolderName)
      const sfid=await getOrCreateFolder(`Task_${task.id}`,fid)
      const up=await uploadFile(file,sfid)
      const updated={...task,attachments:[...(task.attachments||[]),{id:up.id,name:up.name,url:up.webViewLink,thumbnail:up.thumbnailLink||null}]}
      await updateTask(settings.spreadsheetId,updated); onUpdate(updated)
    }catch(e){ alert('Upload failed: '+e.message) }
    finally{ setUploading(false) }
  }

  const isDone=task.status==='done'
  const subs=task.subTasks||[]
  const atts=task.attachments||[]
  const doneSubs=subs.filter(s=>s.done).length

  return <>
    <div
      data-taskid={task.id}
      className={`bg-white rounded-2xl border mb-2 overflow-hidden transition-all
        ${isDone?'border-green-100':'border-gray-100'}
        ${isDragging?'opacity-40 scale-95 shadow-none':'shadow-sm'}
        ${isDragOver?'border-indigo-400 border-2 shadow-md':''}`}>

      {/* ── Main compact row ── */}
      <div className="flex items-center gap-2 px-2 py-3">
        {/* Drag handle */}
        <div onPointerDown={onDragHandlePointerDown}
          className="flex-shrink-0 w-5 h-8 flex items-center justify-center text-gray-200 cursor-grab active:cursor-grabbing touch-none select-none hover:text-gray-400">
          <Ico k="grip" size={14}/>
        </div>
        {/* Checkbox */}
        <button onClick={toggleDone} disabled={busy} className="flex-shrink-0 w-6 h-6">
          <Ico k={isDone?'checkCircle':'circle'} size={22} className={isDone?'text-green-500':'text-gray-300'}/>
        </button>
        {/* Text + progress */}
        <div className="flex-1 min-w-0">
          {editingText
            ?<div className="flex gap-2 items-center">
              <input autoFocus value={editText} onChange={e=>setEditText(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter')saveEdit();if(e.key==='Escape')setEditingText(false)}}
                className="flex-1 border border-indigo-400 rounded-lg px-2 py-1 text-sm focus:outline-none"/>
              <button onClick={saveEdit} className="text-indigo-500 font-semibold text-sm px-1">Save</button>
              <button onClick={()=>setEditingText(false)} className="text-gray-400">✕</button>
            </div>
            :<p className={`text-sm font-medium leading-snug ${isDone?'line-through text-gray-400':'text-gray-800'}`}>
              {task.text}
            </p>}
          {/* Inline progress bar */}
          {subs.length>0&&!editingText&&<div className="flex items-center gap-1.5 mt-1">
            <div className="flex-1 h-1 bg-gray-100 rounded-full overflow-hidden">
              <div className="h-full bg-green-400 rounded-full transition-all" style={{width:`${(doneSubs/subs.length)*100}%`}}/>
            </div>
            <span className="text-xs text-gray-400 tabular-nums">{doneSubs}/{subs.length}</span>
          </div>}
          {/* Attachment badge */}
          {atts.length>0&&(atts.length===1
            ?<a href={atts[0].url} target="_blank" rel="noopener noreferrer"
                onClick={e=>e.stopPropagation()}
                className="inline-flex items-center gap-0.5 mt-1 text-xs text-blue-500 hover:text-blue-700 active:opacity-70">
                <Ico k="clip" size={10}/>{atts[0].name?<span className="max-w-[120px] truncate">{atts[0].name}</span>:'1 file'}
              </a>
            :<button onClick={e=>{e.stopPropagation();setMenuOpen(true)}}
                className="inline-flex items-center gap-0.5 mt-1 text-xs text-blue-500 hover:text-blue-700 active:opacity-70">
                <Ico k="clip" size={10}/>{atts.length} files
              </button>
          )}
        </div>
        {/* 3-dots */}
        <button onClick={()=>setMenuOpen(true)}
          className="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full text-gray-300 hover:text-gray-500 hover:bg-gray-100 active:bg-gray-200">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
          </svg>
        </button>
      </div>

      {/* ── Sub-tasks ── */}
      {subs.length>0&&<div className="px-9 pb-2 space-y-0">
        {subs.map(s=><div key={s.id} className="flex items-center gap-2 py-1.5 border-t border-gray-50">
          <button onClick={()=>toggleSub(s.id)} className="flex-shrink-0 w-4 h-4">
            <Ico k={s.done?'checkCircle':'circle'} size={16} className={s.done?'text-green-400':'text-gray-300'}/>
          </button>
          <span className={`flex-1 text-xs leading-snug ${s.done?'line-through text-gray-400':'text-gray-600'}`}>{s.text}</span>
          <button onClick={()=>deleteSub(s.id)} className="text-gray-200 hover:text-red-400 flex-shrink-0">
            <Ico k="x" size={12}/>
          </button>
        </div>)}
      </div>}

    </div>

    {/* ── 3-dots action bottom sheet ── */}
    {menuOpen&&<div className="fixed inset-0 bg-black/40 z-50 flex items-end" onClick={()=>setMenuOpen(false)}>
      <div className="bg-white w-full rounded-t-3xl p-5" onClick={e=>e.stopPropagation()}>
        {/* Header with task info + timestamps */}
        <div className="flex items-start justify-between gap-3 mb-4">
          <div className="flex-1 min-w-0">
            <p className="font-semibold text-gray-800 text-sm leading-snug">{task.text}</p>
            <div className="mt-1.5 space-y-0.5">
              <p className="text-xs text-gray-400">📅 Created: {fmtDate(task.createdAt)}</p>
              {task.modifiedAt&&task.modifiedAt!==task.createdAt&&
                <p className="text-xs text-gray-400">✏️ Modified: {fmtDate(task.modifiedAt)}</p>}
              {isDone&&task.doneAt&&
                <p className="text-xs text-green-500">✅ Done: {fmtDate(task.doneAt)}</p>}
              {task.folder&&<p className="text-xs text-indigo-400">📁 {task.folder}</p>}
            </div>
          </div>
          <button onClick={()=>setMenuOpen(false)} className="text-gray-400 flex-shrink-0"><Ico k="x" size={20}/></button>
        </div>

        {/* Attachments preview */}
        {atts.length>0&&<div className="flex flex-wrap gap-1.5 mb-4 pb-4 border-b border-gray-100">
          {atts.map(a=><a key={a.id} href={a.url} target="_blank" rel="noopener noreferrer"
            className="flex items-center gap-1 bg-gray-50 border border-gray-200 rounded-lg px-2 py-1 text-xs text-blue-600 hover:bg-blue-50">
            {a.thumbnail?<img src={a.thumbnail} alt="" className="w-5 h-5 rounded object-cover"/>:<Ico k="clip" size={11}/>}
            <span className="max-w-[90px] truncate">{a.name}</span>
            <Ico k="ext" size={9}/>
          </a>)}
        </div>}

        {/* Add sub-task inline from menu */}
        {addingSub&&<div className="flex gap-1.5 mb-3">
          <input autoFocus value={newSub} onChange={e=>setNewSub(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')addSub();if(e.key==='Escape'){setAddingSub(false);setNewSub('')}}}
            placeholder="Sub-task…"
            className="flex-1 border border-indigo-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-indigo-50"/>
          <button onClick={addSub} disabled={!newSub.trim()||busy} className="bg-indigo-500 text-white rounded-xl px-3 py-2 disabled:opacity-40 text-sm font-medium">Add</button>
          <button onClick={()=>{setAddingSub(false);setNewSub('')}} className="text-gray-400 px-1">✕</button>
        </div>}

        {/* Action grid */}
        <div className="grid grid-cols-4 gap-2">
          {[
            {ico:'edit',    label:'Edit',    fn:()=>{ setMenuOpen(false); setEditText(task.text); setEditingText(true) }},
            {ico:'plus',    label:'Sub-task',fn:()=>{ setAddingSub(true) }, green:true},
            {ico:'archive', label:task.status==='archived'?'Unarchive':'Archive', fn:()=>{ setMenuOpen(false); archive() }},
            {ico:'calendar',label:'Calendar',fn:()=>{ setMenuOpen(false); setCalOpen(true) }, blue:true},
            ...(folders&&folders.length>1?[{ico:'grip',label:'Move',fn:()=>{ setMenuOpen(false); setMoveOpen(true) }}]:[]),
            {ico:'trash',   label:'Delete',  fn:handleDelete, red:true},
          ].map(btn=>(
            <button key={btn.label} onClick={btn.fn}
              className={`flex flex-col items-center gap-1.5 p-3 rounded-2xl transition-colors
                ${btn.red?'bg-red-50 hover:bg-red-100':btn.green?'bg-green-50 hover:bg-green-100':btn.blue?'bg-blue-50 hover:bg-blue-100':'bg-gray-50 hover:bg-gray-100'}`}>
              <Ico k={btn.ico} size={20} className={btn.red?'text-red-500':btn.green?'text-green-600':btn.blue?'text-blue-500':'text-gray-600'}/>
              <span className={`text-xs font-medium ${btn.red?'text-red-500':btn.green?'text-green-600':btn.blue?'text-blue-500':'text-gray-600'}`}>{btn.label}</span>
            </button>
          ))}
          {/* Attach file button */}
          <label className="flex flex-col items-center gap-1.5 p-3 rounded-2xl bg-gray-50 hover:bg-gray-100 cursor-pointer transition-colors">
            <Ico k="clip" size={20} className={uploading?'text-gray-300':'text-gray-600'}/>
            <span className="text-xs font-medium text-gray-600">{uploading?'…':'Attach'}</span>
            <input type="file" className="hidden" disabled={uploading}
              onChange={e=>{ if(e.target.files[0]){ handleAttach(e.target.files[0]); e.target.value='' } }}/>
          </label>
        </div>
      </div>
    </div>}

    {calOpen&&<CalendarModal task={task} onClose={()=>setCalOpen(false)}/>}
    {moveOpen&&folders&&<MoveTaskModal task={task} folders={folders}
      onMove={f=>{ onMoveTask&&onMoveTask(f) }} onClose={()=>setMoveOpen(false)}/>}
  </>
}

// ─── Add Task Modal ───────────────────────────────────────────────────────────
function AddTaskModal({onClose,onAdd,folder}){
  const {settings}=useApp()
  const [text,setText]=useState('')
  const [busy,setBusy]=useState(false)
  const [err,setErr]=useState('')
  async function submit(e){
    e.preventDefault(); if(!text.trim()){setErr('Enter a task');return}
    setBusy(true); setErr('')
    try{ const t=await addTask(settings.spreadsheetId,text.trim(),folder); onAdd(t); onClose() }
    catch(e){ setErr(e.message) }
    finally{ setBusy(false) }
  }
  return <div className="fixed inset-0 bg-black/40 z-40 flex items-end">
    <div className="bg-white w-full rounded-t-3xl p-6">
      <div className="flex items-center justify-between mb-1">
        <h3 className="font-bold text-xl text-gray-800">New Task</h3>
        <button onClick={onClose}><Ico k="x" size={22} className="text-gray-500"/></button>
      </div>
      <p className="text-xs text-indigo-500 font-medium mb-4">📁 {folder}</p>
      <form onSubmit={submit} className="space-y-4">
        <textarea autoFocus value={text} onChange={e=>setText(e.target.value)} placeholder="What needs to be done?" rows={3}
          className="w-full border border-gray-200 rounded-2xl px-4 py-3 text-base resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        {err&&<p className="text-sm text-red-500">{err}</p>}
        <button type="submit" disabled={busy||!text.trim()}
          className="w-full flex items-center justify-center gap-2 bg-indigo-500 text-white rounded-2xl py-3.5 font-semibold hover:bg-indigo-600 disabled:opacity-50">
          <Ico k="plus" size={20} className="text-white"/>{busy?'Adding…':'Add Task'}
        </button>
      </form>
    </div>
  </div>
}

// ─── Tasks Tab ────────────────────────────────────────────────────────────────
function TasksTab(){
  const {tasks,setTasks,loading}=useApp()
  const [sub,setSub]=useState('active')
  const [showAdd,setShowAdd]=useState(false)

  // ── Folders ──
  const [folders,setFolders]=useState(loadFolders)
  const [activeFolder,setActiveFolder]=useState(()=>loadFolders()[0]||'Personal')
  const [folderModal,setFolderModal]=useState(null) // null | 'add' | {rename: folderName}
  const [folderMenuFor,setFolderMenuFor]=useState(null) // folder name showing context menu
  const lpTimer=useRef(null)

  function handleFolderLongPress(f){
    lpTimer.current=setTimeout(()=>setFolderMenuFor(f),500)
  }
  function cancelLongPress(){ clearTimeout(lpTimer.current) }

  function addFolder(name){
    if(folders.includes(name)) return
    const next=[...folders,name]
    saveFolders(next); setFolders(next); setActiveFolder(name)
  }
  function renameFolder(oldName,newName){
    if(!newName||folders.includes(newName)) return
    const next=folders.map(f=>f===oldName?newName:f)
    saveFolders(next); setFolders(next)
    if(activeFolder===oldName) setActiveFolder(newName)
    // update tasks in that folder
    setTasks(prev=>prev.map(t=>t.folder===oldName?{...t,folder:newName}:t))
  }
  function deleteFolder(name){
    if(folders.length<=1){alert('You need at least one folder.');return}
    if(!confirm(`Delete folder "${name}"? Tasks inside will move to "${folders.filter(f=>f!==name)[0]}".`)) return
    const fallback=folders.filter(f=>f!==name)[0]
    const next=folders.filter(f=>f!==name)
    saveFolders(next); setFolders(next)
    if(activeFolder===name) setActiveFolder(fallback)
    setTasks(prev=>prev.map(t=>t.folder===name?{...t,folder:fallback}:t))
  }

  // ── Order ──
  const orderKey=`taskOrder_${activeFolder}_${sub}`
  const [orderMap,setOrderMap]=useState(()=>{ try{return JSON.parse(localStorage.getItem(orderKey)||'{}')}catch{return {}} })
  useEffect(()=>{ try{setOrderMap(JSON.parse(localStorage.getItem(`taskOrder_${activeFolder}_${sub}`)||'{}'))}catch{setOrderMap({})} },[activeFolder,sub])
  function saveOrder(ids){ const m={}; ids.forEach((id,i)=>m[id]=i); localStorage.setItem(`taskOrder_${activeFolder}_${sub}`,JSON.stringify(m)); setOrderMap(m) }
  function sortedList(items){ return [...items].sort((a,b)=>{ const oa=orderMap[a.id]??99999,ob=orderMap[b.id]??99999; return oa!==ob?oa-ob:new Date(b.createdAt)-new Date(a.createdAt) }) }

  // ── Drag ──
  const [dragId,setDragId]=useState(null)
  const [dragOverId,setDragOverId]=useState(null)
  const containerRef=useRef(null)
  function startDrag(e,id){ e.preventDefault(); e.currentTarget.setPointerCapture(e.pointerId); setDragId(id); setDragOverId(null) }
  function onPointerMove(e){ if(!dragId) return; const els=document.elementsFromPoint(e.clientX,e.clientY); for(const el of els){ const tid=el.closest('[data-taskid]')?.dataset?.taskid; if(tid&&tid!==dragId){setDragOverId(tid);break} } }
  function onPointerUp(){
    if(dragId&&dragOverId&&dragId!==dragOverId){
      const cur=sortedList(tasks.filter(t=>t.folder===activeFolder&&t.status===sub))
      const fi=cur.findIndex(t=>t.id===dragId), ti=cur.findIndex(t=>t.id===dragOverId)
      if(fi!==-1&&ti!==-1){ const r=[...cur]; const [m]=r.splice(fi,1); r.splice(ti,0,m); saveOrder(r.map(t=>t.id)) }
    }
    setDragId(null); setDragOverId(null)
  }

  const folderTasks=tasks.filter(t=>t.folder===activeFolder)
  const active=folderTasks.filter(t=>t.status==='active')
  const done=folderTasks.filter(t=>t.status==='done')
  const list=sortedList(sub==='active'?active:done)

  const upd=u=>setTasks(p=>p.map(t=>t.id===u.id?u:t))
  const del=id=>{ setTasks(p=>p.filter(t=>t.id!==id)); setDragId(null) }
  const add=t=>{ setTasks(p=>[t,...p]); setSub('active'); saveOrder([t.id,...sortedList(active).map(x=>x.id)]) }
  function moveTask(task,toFolder){ const updated={...task,folder:toFolder,modifiedAt:now()}; updateTask(settings?.spreadsheetId,updated).catch(()=>{}); upd(updated) }

  const {settings}=useApp()

  return <div ref={containerRef} className="flex flex-col h-full relative" onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerLeave={onPointerUp}>

    {/* ── Folder tabs ── */}
    <div className="flex items-center gap-0 px-3 pt-3 pb-1 overflow-x-auto no-sb">
      {folders.map(f=>(
        <button key={f}
          onClick={()=>setActiveFolder(f)}
          onPointerDown={()=>handleFolderLongPress(f)}
          onPointerUp={cancelLongPress}
          onPointerLeave={cancelLongPress}
          className={`flex-shrink-0 flex items-center gap-1.5 px-3.5 py-2 mr-1.5 rounded-2xl text-sm font-semibold transition-all ${
            activeFolder===f
              ? 'bg-indigo-500 text-white shadow-sm'
              : 'bg-gray-100 text-gray-500 hover:bg-gray-200'
          }`}
        >
          <span className="w-5 h-5 rounded-lg flex items-center justify-center text-xs font-bold"
            style={{background: activeFolder===f?'rgba(255,255,255,0.25)':'rgba(0,0,0,0.06)'}}>
            {f[0].toUpperCase()}
          </span>
          {f}
          <span className={`text-xs rounded-full px-1.5 py-0.5 font-medium ${activeFolder===f?'bg-white/20 text-white':'bg-gray-200 text-gray-500'}`}>
            {tasks.filter(t=>t.folder===f&&t.status==='active').length}
          </span>
        </button>
      ))}
      {/* Add folder button */}
      <button onClick={()=>setFolderModal('add')}
        className="flex-shrink-0 w-9 h-9 flex items-center justify-center rounded-2xl bg-gray-100 text-gray-400 hover:bg-indigo-50 hover:text-indigo-500 transition-colors">
        <Ico k="plus" size={18}/>
      </button>
    </div>

    {/* Folder context menu */}
    {folderMenuFor&&<div className="fixed inset-0 z-40" onClick={()=>setFolderMenuFor(null)}>
      <div className="absolute top-24 left-1/2 -translate-x-1/2 bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden min-w-[200px]"
        onClick={e=>e.stopPropagation()}>
        <div className="px-4 py-3 border-b border-gray-100 font-semibold text-gray-700">📁 {folderMenuFor}</div>
        <button onClick={()=>{ setFolderModal({rename:folderMenuFor}); setFolderMenuFor(null) }}
          className="w-full flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50">
          <Ico k="edit" size={16}/>Rename folder
        </button>
        <button onClick={()=>{ deleteFolder(folderMenuFor); setFolderMenuFor(null) }}
          className="w-full flex items-center gap-3 px-4 py-3 text-sm text-red-500 hover:bg-red-50">
          <Ico k="trash" size={16}/>Delete folder
        </button>
      </div>
    </div>}

    {/* ── Active / Done sub-tabs ── */}
    <div className="flex bg-gray-100 rounded-2xl mx-4 mt-2 mb-2 p-1 gap-1">
      {[['active',`Active (${active.length})`],['done',`Done (${done.length})`]].map(([k,l])=>
        <button key={k} onClick={()=>setSub(k)}
          className={`flex-1 py-2 rounded-xl text-sm font-semibold transition-all ${sub===k?'bg-white text-indigo-600 shadow-sm':'text-gray-500'}`}>{l}</button>)}
    </div>

    {/* ── Task list ── */}
    <div className="flex-1 overflow-y-auto scrollable px-4 pb-24 no-sb">
      {loading
        ?<div className="flex justify-center items-center h-32"><Ico k="sync" size={24} className="text-indigo-400 spin"/></div>
        :list.length===0
          ?<div className="flex flex-col items-center justify-center h-48 text-gray-400">
            <div className="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-3">
              <Ico k="task" size={32} className="text-gray-300"/>
            </div>
            <p className="font-medium">{sub==='active'?`No tasks in ${activeFolder}`:'No completed tasks'}</p>
            {sub==='active'&&<p className="text-sm mt-1">Tap + to add your first task</p>}
          </div>
          :list.map(t=><TaskItem
            key={t.id} task={t}
            onUpdate={upd} onDelete={del}
            folders={folders}
            onMoveTask={(toFolder)=>moveTask(t,toFolder)}
            isDragging={dragId===t.id}
            isDragOver={dragOverId===t.id&&dragId!==t.id}
            onDragHandlePointerDown={e=>startDrag(e,t.id)}
          />)
      }
    </div>

    {/* FAB */}
    {sub==='active'&&<button onClick={()=>setShowAdd(true)}
      className="absolute bottom-6 right-4 w-14 h-14 bg-indigo-500 rounded-full shadow-lg flex items-center justify-center hover:bg-indigo-600 active:bg-indigo-700">
      <Ico k="plus" size={28} className="text-white"/>
    </button>}

    {showAdd&&<AddTaskModal onClose={()=>setShowAdd(false)} onAdd={add} folder={activeFolder}/>}

    {folderModal==='add'&&<FolderNameModal title="New Folder" onSave={addFolder} onClose={()=>setFolderModal(null)}/>}
    {folderModal?.rename&&<FolderNameModal title="Rename Folder" initial={folderModal.rename}
      onSave={name=>renameFolder(folderModal.rename,name)} onClose={()=>setFolderModal(null)}/>}
  </div>
}

// ─── Note Item ────────────────────────────────────────────────────────────────
function NoteItem({note,onUpdate,onDelete}){
  const {settings}=useApp()
  const [expanded,setExpanded]=useState(false)
  const [editing,setEditing]=useState(false)
  const [form,setForm]=useState({title:note.title,project:note.project,body:note.body})
  const [uploading,setUploading]=useState(false)
  const [busy,setBusy]=useState(false)
  const [copied,setCopied]=useState(false)
  async function run(fn){ setBusy(true); try{ await fn() }catch(e){ alert(e.message) }finally{ setBusy(false) } }
  async function saveEdit(){
    if(!form.title.trim()) return
    const updated={...note,...form}
    await run(async()=>{ await updateNote(settings.spreadsheetId,updated); onUpdate(updated); setEditing(false) })
  }
  async function archive(){
    const updated={...note,status:note.status==='archived'?'active':'archived'}
    await run(async()=>{ await updateNote(settings.spreadsheetId,updated); onUpdate(updated) })
  }
  async function handleDelete(){
    if(!confirm('Delete this note?')) return
    await run(async()=>{ await deleteNote(settings.spreadsheetId,note.id); onDelete(note.id) })
  }
  function copyNote(){
    const txt=[note.title,note.project?`Project: ${note.project}`:'','',note.body,'',
      (note.attachments||[]).map(a=>a.url).join('\n')].filter(l=>l!==undefined).join('\n').trim()
    navigator.clipboard.writeText(txt); setCopied(true); setTimeout(()=>setCopied(false),2000)
  }
  function shareNote(){
    const txt=[note.title,note.project?`Project: ${note.project}`:'','',note.body].filter(Boolean).join('\n')
    if(navigator.share) navigator.share({title:note.title,text:txt}); else copyNote()
  }
  async function handleAttach(e){
    const files=Array.from(e.target.files); if(!files.length) return
    setUploading(true)
    try{
      let cur={...note}
      for(const file of files){
        const fid=await getOrCreateFolder(settings.driveFolderName)
        const sfid=await getOrCreateFolder(`Note_${note.id}`,fid)
        const up=await uploadFile(file,sfid)
        cur={...cur,attachments:[...(cur.attachments||[]),{id:up.id,name:up.name,url:up.webViewLink,thumbnail:up.thumbnailLink||null}]}
        await updateNote(settings.spreadsheetId,cur)
      }
      onUpdate(cur)
    }catch(e){ alert('Upload failed: '+e.message) }
    finally{ setUploading(false); e.target.value='' }
  }
  const atts=note.attachments||[]
  return <div className="bg-white rounded-2xl shadow-sm border border-gray-100 mb-3 overflow-hidden">
    <div className="p-4">
      {editing?<div className="space-y-3">
        <input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Title"
          className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        <input value={form.project} onChange={e=>setForm({...form,project:e.target.value})} placeholder="Project (optional)"
          className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        <textarea value={form.body} onChange={e=>setForm({...form,body:e.target.value})} rows={5} placeholder="Note content…"
          className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        <div className="flex gap-2">
          <button onClick={saveEdit} disabled={busy} className="flex-1 bg-indigo-500 text-white rounded-xl py-2.5 font-semibold text-sm hover:bg-indigo-600 disabled:opacity-50">{busy?'Saving…':'Save'}</button>
          <button onClick={()=>setEditing(false)} className="flex-1 bg-gray-100 text-gray-600 rounded-xl py-2.5 font-semibold text-sm">Cancel</button>
        </div>
      </div>:<>
        <div className="flex items-start justify-between gap-2">
          <div className="flex-1 min-w-0">
            <h3 className="font-bold text-gray-800 text-base leading-snug">{note.title}</h3>
            {note.project&&<span className="inline-block mt-1 text-xs bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full font-medium">{note.project}</span>}
          </div>
          <button onClick={()=>setExpanded(!expanded)} className="text-gray-400 mt-0.5 flex-shrink-0 w-5 h-5">
            <Ico k={expanded?'chevUp':'chevDown'} size={18}/>
          </button>
        </div>
        <p className={`mt-2 text-sm text-gray-600 leading-relaxed ${expanded?'':'line-clamp-3'}`}>{note.body}</p>
        <div className="mt-1.5 space-y-0.5">
          <p className="text-xs text-gray-400">Created: {fmtDate(note.createdAt)}</p>
          {note.modifiedAt&&note.modifiedAt!==note.createdAt&&<p className="text-xs text-gray-400">Modified: {fmtDate(note.modifiedAt)}</p>}
        </div>
        {expanded&&atts.length>0&&<div className="mt-3 pt-3 border-t border-gray-50">
          <p className="text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wide">Files</p>
          <div className="flex flex-wrap gap-2">
            {atts.map(a=><a key={a.id} href={a.url} target="_blank" rel="noopener noreferrer"
              className="flex items-center gap-1.5 bg-gray-50 border border-gray-200 rounded-lg px-2.5 py-1.5 text-xs text-blue-600 hover:bg-blue-50">
              {a.thumbnail?<img src={a.thumbnail} alt="" className="w-8 h-8 rounded object-cover"/>:<Ico k="clip" size={12}/>}
              <span className="max-w-[100px] truncate">{a.name}</span>
              <Ico k="ext" size={10}/>
            </a>)}
          </div>
        </div>}
        <div className="flex items-center gap-1 mt-3 pt-3 border-t border-gray-50 flex-wrap">
          <ActionBtn ico="copy" label={copied?'Copied!':'Copy'} onClick={copyNote}/>
          <ActionBtn ico="share" label="Share" onClick={shareNote}/>
          <ActionBtn ico="edit" label="Edit" onClick={()=>{setForm({title:note.title,project:note.project,body:note.body});setEditing(true)}}/>
          <ActionBtn ico="archive" label={note.status==='archived'?'Unarchive':'Archive'} onClick={archive}/>
          <div className="flex-1"/>
          <label className={`flex items-center gap-1 text-xs text-gray-500 bg-gray-50 rounded-lg px-2.5 py-1.5 cursor-pointer hover:bg-gray-100 ${uploading?'opacity-50':''}`}>
            <Ico k="clip" size={13}/>{uploading?'…':'File'}
            <input type="file" multiple className="hidden" onChange={handleAttach} disabled={uploading} accept="image/*,*/*"/>
          </label>
          <ActionBtn ico="trash" label="" color="red" onClick={handleDelete}/>
        </div>
      </>}
    </div>
  </div>
}

// ─── Add Note Modal ───────────────────────────────────────────────────────────
function AddNoteModal({onClose,onAdd}){
  const {settings}=useApp()
  const [form,setForm]=useState({title:'',project:'',body:''})
  const [files,setFiles]=useState([])
  const [busy,setBusy]=useState(false)
  const [err,setErr]=useState('')
  async function submit(e){
    e.preventDefault()
    if(!form.title.trim()){setErr('Title required');return}
    if(!form.body.trim()){setErr('Note content required');return}
    setBusy(true); setErr('')
    try{
      let note=await addNote(settings.spreadsheetId,form)
      for(const file of files){
        const fid=await getOrCreateFolder(settings.driveFolderName)
        const sfid=await getOrCreateFolder(`Note_${note.id}`,fid)
        const up=await uploadFile(file,sfid)
        note={...note,attachments:[...(note.attachments||[]),{id:up.id,name:up.name,url:up.webViewLink,thumbnail:up.thumbnailLink||null}]}
        await updateNote(settings.spreadsheetId,note)
      }
      onAdd(note); onClose()
    }catch(e){ setErr(e.message) }
    finally{ setBusy(false) }
  }
  return <div className="fixed inset-0 bg-black/40 z-40 flex items-end">
    <div className="bg-white w-full rounded-t-3xl max-h-[90vh] overflow-y-auto scrollable">
      <div className="p-6">
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-bold text-xl text-gray-800">New Note</h3>
          <button onClick={onClose}><Ico k="x" size={22} className="text-gray-500"/></button>
        </div>
        <form onSubmit={submit} className="space-y-3">
          <input autoFocus value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Title *"
            className="w-full border border-gray-200 rounded-2xl px-4 py-3 text-base font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
          <input value={form.project} onChange={e=>setForm({...form,project:e.target.value})} placeholder="Project (optional)"
            className="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
          <textarea value={form.body} onChange={e=>setForm({...form,body:e.target.value})} placeholder="Write your note here…" rows={6}
            className="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
          {files.length>0&&<div className="flex flex-wrap gap-2">
            {files.map((f,i)=><div key={i} className="flex items-center gap-1.5 bg-gray-100 rounded-lg px-2.5 py-1.5 text-xs text-gray-600">
              <Ico k="clip" size={12}/><span className="max-w-[100px] truncate">{f.name}</span>
              <button type="button" onClick={()=>setFiles(p=>p.filter((_,j)=>j!==i))} className="text-gray-400 hover:text-red-400">✕</button>
            </div>)}
          </div>}
          <label className="flex items-center gap-2 text-sm text-gray-500 cursor-pointer bg-gray-50 rounded-2xl px-4 py-3 hover:bg-gray-100 border border-dashed border-gray-200">
            <Ico k="clip" size={16}/>Attach files or photos
            <input type="file" multiple className="hidden" onChange={e=>setFiles(p=>[...p,...Array.from(e.target.files)])} accept="image/*,*/*"/>
          </label>
          {err&&<p className="text-sm text-red-500">{err}</p>}
          <button type="submit" disabled={busy||!form.title.trim()||!form.body.trim()}
            className="w-full flex items-center justify-center gap-2 bg-indigo-500 text-white rounded-2xl py-3.5 font-semibold hover:bg-indigo-600 disabled:opacity-50">
            <Ico k="plus" size={20} className="text-white"/>{busy?'Saving…':'Add Note'}
          </button>
        </form>
      </div>
    </div>
  </div>
}

// ─── Notes Tab ────────────────────────────────────────────────────────────────
function NotesTab(){
  const {notes,setNotes,loading}=useApp()
  const [sub,setSub]=useState('active')
  const [showAdd,setShowAdd]=useState(false)
  const active=notes.filter(n=>n.status==='active')
  const archived=notes.filter(n=>n.status==='archived')
  const list=sub==='active'?active:archived
  const upd=u=>setNotes(p=>p.map(n=>n.id===u.id?u:n))
  const del=id=>setNotes(p=>p.filter(n=>n.id!==id))
  const add=n=>{setNotes(p=>[n,...p]);setSub('active')}
  return <div className="flex flex-col h-full relative">
    <div className="flex bg-gray-100 rounded-2xl m-4 mb-2 p-1 gap-1">
      {[['active',`Active (${active.length})`],['archived',`Archived (${archived.length})`]].map(([k,l])=>
        <button key={k} onClick={()=>setSub(k)}
          className={`flex-1 py-2 rounded-xl text-sm font-semibold transition-all ${sub===k?'bg-white text-indigo-600 shadow-sm':'text-gray-500'}`}>{l}</button>)}
    </div>
    <div className="flex-1 overflow-y-auto scrollable px-4 pb-24 no-sb">
      {loading?<div className="flex justify-center items-center h-32"><Ico k="sync" size={24} className="text-indigo-400 spin"/></div>
      :list.length===0?<div className="flex flex-col items-center justify-center h-48 text-gray-400">
          <div className="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-3">
            <Ico k="note" size={32} className="text-gray-300"/>
          </div>
          <p className="font-medium">{sub==='active'?'No notes yet':'No archived notes'}</p>
          {sub==='active'&&<p className="text-sm mt-1">Tap + to write your first note</p>}
        </div>
      :list.map(n=><NoteItem key={n.id} note={n} onUpdate={upd} onDelete={del}/>)}
    </div>
    {sub==='active'&&<button onClick={()=>setShowAdd(true)}
      className="absolute bottom-6 right-4 w-14 h-14 bg-indigo-500 rounded-full shadow-lg flex items-center justify-center hover:bg-indigo-600 active:bg-indigo-700">
      <Ico k="plus" size={28} className="text-white"/>
    </button>}
    {showAdd&&<AddNoteModal onClose={()=>setShowAdd(false)} onAdd={add}/>}
  </div>
}

// ─── App Shell ────────────────────────────────────────────────────────────────
function Shell(){
  const {user,syncing}=useApp()
  const [tab,setTab]=useState('tasks')
  const [showSettings,setShowSettings]=useState(false)
  if(!user) return <LoginScreen/>
  return <div className="flex flex-col h-full bg-gray-50">
    <div className="flex items-center justify-between px-5 pt-12 pb-3 bg-white border-b border-gray-100">
      <div className="flex items-center gap-2">
        <div className="w-8 h-8 bg-indigo-500 rounded-xl flex items-center justify-center">
          <Ico k="task" size={18} className="text-white"/>
        </div>
        <h1 className="text-lg font-bold text-gray-800">Tasks & Notes</h1>
      </div>
      <div className="flex items-center gap-2">
        {syncing&&<Ico k="sync" size={16} className="text-indigo-400 spin"/>}
        <button onClick={()=>setShowSettings(true)} className="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100">
          <Ico k="settings" size={20} className="text-gray-600"/>
        </button>
      </div>
    </div>
    <div className="flex border-b border-gray-100 bg-white">
      {[['tasks','task','Tasks'],['notes','note','Notes']].map(([id,ico,label])=>
        <button key={id} onClick={()=>setTab(id)}
          className={`flex-1 flex items-center justify-center gap-1.5 py-3 text-sm font-semibold border-b-2 transition-colors ${tab===id?'border-indigo-500 text-indigo-600':'border-transparent text-gray-400 hover:text-gray-600'}`}>
          <Ico k={ico} size={16}/>{label}
        </button>)}
    </div>
    <div className="flex-1 overflow-hidden">
      {tab==='tasks'?<TasksTab/>:<NotesTab/>}
    </div>
    {showSettings&&<SettingsScreen onClose={()=>setShowSettings(false)}/>}
  </div>
}

function App(){
  return <AppProvider><Shell/></AppProvider>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
